<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>سباق المعلومات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #14162B 0%, #1B1E3D 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; color: #F5F3ED;
  }
  .container { width: 100%; max-width: 420px; }
  .brand { text-align: center; font-size: 30px; font-weight: 900; margin-bottom: 18px; }
  .brand .gold { color: #F2B705; }
  .brand .pink { color: #FF5D8F; }
  .card { background: #1E2140; border: 1px solid #2E3160; border-radius: 18px; padding: 22px; animation: floatIn .4s ease-out; }
  @keyframes floatIn { from { opacity:0; transform: translateY(10px);} to { opacity:1; transform: translateY(0);} }
  .subtitle { font-size: 14px; color: #B7B9D6; text-align: center; margin-bottom: 14px; line-height: 1.6; }
  input {
    width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #3A3D5C;
    background: #151833; color: #F5F3ED; font-size: 16px;
  }
  input:focus-visible, button:focus-visible { outline: 3px solid #F2B705; outline-offset: 2px; }
  .btn-primary {
    width: 100%; padding: 12px 14px; border-radius: 12px; border: none;
    background: #F2B705; color: #14162B; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 14px;
  }
  .btn-secondary {
    padding: 12px 18px; border-radius: 12px; border: 1px solid #FF5D8F;
    background: transparent; color: #FF5D8F; font-weight: 700; font-size: 15px; cursor: pointer;
  }
  .divider { text-align: center; color: #6E7199; font-size: 12px; margin: 14px 0; }
  .error { color: #FF9E7A; font-size: 13px; margin-top: 8px; text-align: center; }
  .join-row { display: flex; gap: 8px; }
  .code-box {
    text-align: center; font-size: 40px; font-weight: 900; letter-spacing: 8px; color: #F2B705;
    background: #151833; border-radius: 14px; padding: 16px 0; margin: 12px 0 18px;
  }
  .opp-row { display: flex; align-items: center; gap: 10px; padding: 8px 4px; font-size: 15px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .hint { font-size: 12px; color: #8285AC; text-align: center; line-height: 1.6; }
  .progress-row { display: flex; justify-content: space-between; font-size: 13px; color: #B7B9D6; margin-bottom: 6px; }
  .progress-track { height: 6px; background: #151833; border-radius: 4px; overflow: hidden; margin-bottom: 18px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #F2B705, #FF5D8F); transition: width .3s ease; }
  .q-box { font-size: 19px; font-weight: 700; text-align: center; padding: 10px 6px 22px; line-height: 1.6; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn {
    padding: 14px 8px; border-radius: 12px; border: 2px solid #3A3D5C; background: #232748;
    color: #F5F3ED; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s ease;
  }
  .choice-btn.correct { background: #1F4D3A; border-color: #3FBF7F; }
  .choice-btn.wrong { background: #4D1F2A; border-color: #FF5D8F; }
  .choice-btn:disabled { cursor: default; }
  .opp-live { margin-top: 20px; padding: 10px 12px; background: #151833; border-radius: 12px; display: flex; flex-direction: column; gap: 4px; }
  .results-header { text-align: center; font-size: 22px; font-weight: 900; margin-bottom: 16px; color: #F2B705; }
  .results-row { display: flex; align-items: center; gap: 10px; justify-content: center; }
  .result-card { flex: 1; border: 2px solid; border-radius: 14px; padding: 16px 8px; text-align: center; background: #151833; }
  .big-score { font-size: 34px; font-weight: 900; margin: 6px 0; }
  .vs { font-weight: 900; color: #6E7199; font-size: 13px; }
  .winner-banner {
    margin-top: 18px; text-align: center; font-weight: 700; font-size: 16px; padding: 12px 8px;
    background: linear-gradient(90deg, rgba(242,183,5,0.15), rgba(255,93,143,0.15)); border-radius: 12px;
  }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="brand"><span class="gold">سباق</span><span class="pink"> المعلومات</span></div>

  <!-- Name / entry screen -->
  <div class="card" id="screen-name">
    <p class="subtitle">اتحدى صاحبك في سباق معلومات سريع — 10 أسئلة، أسرع نقاط تكسب</p>
    <input id="nameInput" placeholder="اكتب اسمك" maxlength="16" />
    <div id="nameError" class="error hidden"></div>
    <button class="btn-primary" id="createBtn">أنشئ غرفة</button>
    <div class="divider">أو</div>
    <div class="join-row">
      <input id="codeInput" placeholder="كود الغرفة" maxlength="4" style="text-align:center;letter-spacing:4px;" />
      <button class="btn-secondary" id="joinBtn">انضم</button>
    </div>
  </div>

  <!-- Lobby screen -->
  <div class="card hidden" id="screen-lobby">
    <p class="subtitle">ابعت الكود ده لصاحبك عشان ينضم:</p>
    <div class="code-box" id="codeBox">----</div>
    <div class="opp-row"><div class="dot" style="background:#F2B705"></div><span id="lobbyMeName"></span></div>
    <div class="opp-row"><div class="dot" id="lobbyOppDot" style="background:#3A3D5C"></div><span id="lobbyOppName">في انتظار صاحبك...</span></div>
    <button class="btn-primary" id="startBtn">ابدأ اللعب</button>
    <p class="hint" style="margin-top:10px;">مش لازم تستنوا بعض بالظبط — كل واحد يبدأ لما يكون جاهز.</p>
  </div>

  <!-- Playing screen -->
  <div class="card hidden" id="screen-playing">
    <div class="progress-row"><span id="qCounter">سؤال 1 / 10</span><span id="myScore">نقاطك: 0</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="q-box" id="qText"></div>
    <div class="choices" id="choicesGrid"></div>
    <div class="opp-live hidden" id="oppLive">
      <span style="color:#FF5D8F;font-weight:700;" id="oppLiveName"></span>
      <span class="hint" id="oppLiveStatus"></span>
    </div>
  </div>

  <!-- Results screen -->
  <div class="card hidden" id="screen-results">
    <div class="results-header">النتيجة</div>
    <div class="results-row">
      <div class="result-card" style="border-color:#F2B705;">
        <div style="color:#F2B705;font-weight:700;" id="resMeName"></div>
        <div class="big-score" id="resMeScore">0</div>
        <div class="hint" id="resMeTime"></div>
      </div>
      <div class="vs">VS</div>
      <div class="result-card" style="border-color:#FF5D8F;">
        <div style="color:#FF5D8F;font-weight:700;" id="resOppName">...</div>
        <div class="big-score" id="resOppScore">-</div>
        <div class="hint" id="resOppTime"></div>
      </div>
    </div>
    <div class="hint" id="resPending" style="margin-top:14px;">هتعرف مين الفايز لما صاحبك يخلص...</div>
    <div class="winner-banner hidden" id="winnerBanner"></div>
    <button class="btn-primary" id="playAgainBtn">لعبة جديدة</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  let myName = "";
  let roomCode = "";
  let questions = [];
  let qIndex = 0;
  let myScore = 0;
  let selectedIdx = null;
  let latestOpponent = null;

  const $ = (id) => document.getElementById(id);
  const show = (id) => { $(id).classList.remove("hidden"); };
  const hide = (id) => { $(id).classList.add("hidden"); };
  const showOnly = (id) => {
    ["screen-name","screen-lobby","screen-playing","screen-results"].forEach(s => s === id ? show(s) : hide(s));
  };

  $("createBtn").onclick = () => {
    myName = $("nameInput").value.trim();
    if (!myName) { $("nameError").textContent = "اكتب اسمك الأول"; show("nameError"); return; }
    hide("nameError");
    socket.emit("create-room", { name: myName }, (res) => {
      if (!res.ok) return;
      roomCode = res.code;
      questions = res.questions;
      $("codeBox").textContent = roomCode;
      $("lobbyMeName").textContent = myName + " (إنت)";
      showOnly("screen-lobby");
    });
  };

  $("joinBtn").onclick = () => {
    myName = $("nameInput").value.trim();
    const code = $("codeInput").value.trim();
    if (!myName) { $("nameError").textContent = "اكتب اسمك الأول"; show("nameError"); return; }
    if (code.length !== 4) { $("nameError").textContent = "اكتب كود مكون من 4 أرقام"; show("nameError"); return; }
    hide("nameError");
    socket.emit("join-room", { name: myName, code }, (res) => {
      if (!res.ok) { $("nameError").textContent = res.error; show("nameError"); return; }
      roomCode = code;
      questions = res.questions;
      $("codeBox").textContent = roomCode;
      $("lobbyMeName").textContent = myName + " (إنت)";
      showOnly("screen-lobby");
    });
  };

  socket.on("room-update", (summary) => {
    if (!summary) return;
    const others = summary.players.filter(p => p.id !== socket.id);
    latestOpponent = others[0] || null;

    if ($("screen-lobby").classList.contains("hidden") === false) {
      if (latestOpponent) {
        $("lobbyOppName").textContent = latestOpponent.name;
        $("lobbyOppDot").style.background = "#FF5D8F";
      } else {
        $("lobbyOppName").textContent = "في انتظار صاحبك...";
        $("lobbyOppDot").style.background = "#3A3D5C";
      }
    }

    if ($("screen-playing").classList.contains("hidden") === false && latestOpponent) {
      show("oppLive");
      $("oppLiveName").textContent = latestOpponent.name;
      $("oppLiveStatus").textContent = latestOpponent.finished
        ? `خلص! نقاطه ${latestOpponent.score}`
        : `عند السؤال ${latestOpponent.index + 1} — ${latestOpponent.score} نقطة`;
    }

    if ($("screen-results").classList.contains("hidden") === false) {
      updateResultsScreen();
    }
  });

  $("startBtn").onclick = () => {
    qIndex = 0; myScore = 0; selectedIdx = null;
    socket.emit("start-timer");
    showOnly("screen-playing");
    renderQuestion();
  };

  function renderQuestion() {
    selectedIdx = null;
    const q = questions[qIndex];
    $("qCounter").textContent = `سؤال ${qIndex + 1} / ${questions.length}`;
    $("myScore").textContent = `نقاطك: ${myScore}`;
    $("progressFill").style.width = `${(qIndex / questions.length) * 100}%`;
    $("qText").textContent = q.q;
    const grid = $("choicesGrid");
    grid.innerHTML = "";
    q.choices.forEach((c, i) => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      btn.textContent = c;
      btn.onclick = () => chooseAnswer(i, btn);
      grid.appendChild(btn);
    });
    if (latestOpponent) {
      show("oppLive");
      $("oppLiveName").textContent = latestOpponent.name;
      $("oppLiveStatus").textContent = latestOpponent.finished
        ? `خلص! نقاطه ${latestOpponent.score}`
        : `عند السؤال ${latestOpponent.index + 1} — ${latestOpponent.score} نقطة`;
    }
  }

  function chooseAnswer(choiceIndex, btnEl) {
    if (selectedIdx !== null) return;
    selectedIdx = choiceIndex;
    const buttons = Array.from($("choicesGrid").children);
    buttons.forEach(b => b.disabled = true);

    socket.emit("answer", { choiceIndex, qIndex }, (res) => {
      myScore = res.score;
      buttons[res.correctIndex].classList.add("correct");
      if (!res.correct) btnEl.classList.add("wrong");

      setTimeout(() => {
        if (res.finished) {
          showResults(res.finishTime);
        } else {
          qIndex += 1;
          renderQuestion();
        }
      }, 900);
    });
  }

  function showResults(finishTime) {
    $("resMeName").textContent = myName + " (إنت)";
    $("resMeScore").textContent = myScore;
    $("resMeTime").textContent = finishTime ? `${finishTime} ثانية` : "";
    showOnly("screen-results");
    updateResultsScreen();
  }

  function updateResultsScreen() {
    if (latestOpponent) {
      $("resOppName").textContent = latestOpponent.name;
      $("resOppScore").textContent = latestOpponent.score;
      $("resOppTime").textContent = latestOpponent.finished ? `${latestOpponent.finishTime} ثانية` : "لسه بيلعب...";

      if (latestOpponent.finished) {
        hide("resPending");
        show("winnerBanner");
        const oppScore = latestOpponent.score;
        const oppTime = latestOpponent.finishTime;
        const myTime = parseFloat($("resMeTime").textContent) || Infinity;
        let text;
        if (myScore === oppScore) {
          if (myTime < oppTime) text = `فزت يا ${myName}! (نفس النقط بس إنت أسرع)`;
          else if (oppTime < myTime) text = `فاز ${latestOpponent.name}! (نفس النقط بس هو أسرع)`;
          else text = "تعادل!";
        } else if (myScore > oppScore) {
          text = `مبروك يا ${myName}! إنت الفايز 🏆`;
        } else {
          text = `فاز ${latestOpponent.name} 🏆`;
        }
        $("winnerBanner").textContent = text;
      }
    }
  }

  $("playAgainBtn").onclick = () => {
    location.reload();
  };
</script>
</body>
</html>
